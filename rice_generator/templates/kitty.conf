# Kitty Configuration Template
# Сгенерировано rice-generator

# === BASIC SETTINGS ===
shell_integration no-rc
allow_remote_control yes
listen_on unix:/tmp/kitty

# === WINDOW SETTINGS ===
enable_audio_bell no
visual_bell_duration 0.0
window_padding_width 10

# === TABS SETTINGS ===
tab_bar_style powerline
powerline_styled_prompts yes
tab_powerline_style slanted
tab_title_template "{title}"
active_tab_font_style bold
inactive_tab_font_style normal

# === COLORS ===
# Эти значения будут заменены на основе анализа скриншота
foreground #c0caf5
background #1a1b26

# Normal colors
color0 #15161e
color1 #f7768e
color2 #9ece6a
color3 #e0af68
color4 #7aa2f7
color5 #bb9af7
color6 #7dcfff
color7 #a9b1d6

# Bright colors
color8 #414868
color9 #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5

# Selection colors
selection_foreground #1a1b26
selection_background #33467c

# Cursor colors
cursor #c0caf5
cursor_text_color #1a1b26

# === FONT SETTINGS ===
font_family JetBrainsMono Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto
font_size 12.0
font_features none
force_ltr no

# === KEYBOARD SHORTCUTS ===
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+n new_os_window_with_cwd
map ctrl+shift+w close_window
map ctrl+shift+] next_window
map ctrl+shift+[ previous_window
map ctrl+shift+enter swap_window_right
map ctrl+shift+alt+enter swap_window_left

# Tab management
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab
map ctrl+shift+t new_tab
map ctrl+shift+q close_tab
map ctrl+shift+. move_tab_right
map ctrl+shift+, move_tab_left

# Scrolling
map ctrl+shift+up scroll_line_up
map ctrl+shift+down scroll_line_down
map ctrl+shift+home scroll_home
map ctrl+shift+end scroll_end
map ctrl+shift+page_up scroll_page_up
map ctrl+shift+page_down scroll_page_down

# Zoom and layout
map ctrl+shift+l next_layout
map ctrl+shift+z toggle_maximized
map ctrl+shift+f toggle_fullscreen

# Font size
map ctrl+shift+equal change_font_size all +2.0
map ctrl+shift+minus change_font_size all -2.0
map ctrl+shift+0 change_font_size all 0

# Clipboard
map ctrl+shift+c copy_or_interrupt
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+s pass_selection_to_program

# Mouse
map ctrl+shift+m mouse_click_url_or_select

# === MOUSE SETTINGS ===
copy_on_select yes
clear_on_mouse_button_up no
click_command launch --type=overlay --stdin-text --title Kitty Scrollback less +F -R

# === URL SCHEMES ===
url_prefixes file ftp ftps gemini git gopher http https irc mailto news sftp ssh
url_excluded_url_parts

# === TERMINAL FEATURES ===
term xterm-kitty
cursor_beam_thickness 1.5
cursor_underline_thickness 2.0
cursor_trail 0
cursor_trail_decay 0.1 0.8

# === PERFORMANCE ===
repaint_delay 10
sync_to_monitor yes
linux_display_server wayland

# === ENVIRONMENT ===
env KITTY_WINDOW_ID=%d
env TERM=xterm-kitty

# === SHELL INTEGRATION ===
shell_integration no-rc

# === INCLUDE OTHER CONFIGS ===
# include ./colors.conf
# include ./keybindings.conf
# include ./tabs.conf
